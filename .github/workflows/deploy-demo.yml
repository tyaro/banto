# ライブデモ（AD-2）: GitHub Pages プロジェクトサイト
# https://tyaro.github.io/banto/ に admin-template を InMemory プロバイダ
# （バックエンド不要）で公開する。svelte.config.js の `BASE_PATH` env で
# ベースパスを切り替える仕組み（Tauri/LAN は既定の base=''、この
# ワークフローだけ `/banto` を指定）を使う。
#
# サードパーティ Action は ci.yml のポリシーどおりコミット SHA 固定。
name: Deploy demo

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-template/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo (BASE_PATH=/banto)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # GitHub Pages のプロジェクトサイトは `/<repo>/` 配下に置かれるため、
      # svelte.config.js の `base` をここでだけ `/banto` にする（Tauri/LAN
      # ビルドは BASE_PATH 未設定 = base='' のまま、byte-identical）。
      - name: Build (project-site base path)
        run: pnpm --filter admin-template build
        env:
          BASE_PATH: /banto

      # SPA deep-link fallback: Pages は未知パスを 404.html に振るので、
      # index.html をコピーして同じ SPA を読み込ませる
      # (svelte.config.js の adapter fallback と同じ発想)。
      - name: SPA fallback (404.html)
        run: cp apps/admin-template/build/index.html apps/admin-template/build/404.html

      - name: Disable Jekyll processing
        run: touch apps/admin-template/build/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/admin-template/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
